name: Build NetSpec (Recovery Build)
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix Damaged Project
        run: |
          # Скачиваем чистый, неповрежденный файл проекта из оригинала
          curl -L https://raw.githubusercontent.com/AAAxis/vless-ios/main/network.xcodeproj/project.pbxproj -o network.xcodeproj/project.pbxproj
          echo "Original project file restored."

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Inject Icon
        run: |
          if [ -f "$PWD/AppIcon.png" ]; then
            ASSETS_PATH=$(find . -name "Assets.xcassets" | head -n 1)
            ICON_SET="$ASSETS_PATH/AppIcon.appiconset"
            mkdir -p "$ICON_SET"
            cp "$PWD/AppIcon.png" "$ICON_SET/icon.png"
            printf '{"images":[{"idiom":"universal","platform":"ios","size":"1024x1024","filename":"icon.png"}],"info":{"version":1,"author":"xcode"}}' > "$ICON_SET/Contents.json"
          fi

      - name: Build App
        run: |
          # PRODUCT_NAME="NetSpec" безопасно меняет имя приложения на лету
          xcodebuild build -project network.xcodeproj -scheme vless-ios \
            -configuration Release -sdk iphoneos \
            -derivedDataPath $PWD/derived_data \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            PRODUCT_NAME="NetSpec" \
            ASSETCATALOG_COMPILER_APPICON_NAME="AppIcon"

      - name: Prepare IPA
        run: |
          mkdir -p build/Payload
          APP_PATH=$(find derived_data -name "NetSpec.app" -type d | grep "Release-iphoneos" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            # Если с PRODUCT_NAME что-то не так, ищем любой .app
            APP_PATH=$(find derived_data -name "*.app" -type d | grep "Release-iphoneos" | head -n 1)
          fi
          
          echo "FOUND APP AT: $APP_PATH"
          cp -r "$APP_PATH" build/Payload/
          cd build && zip -r NetSpec.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetSpec-Final-IPA
          path: build/NetSpec.ipa
